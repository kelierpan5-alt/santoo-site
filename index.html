<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結構系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Michroma&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 進場：白底+Santoo 靜止；僅點擊 Santoo 後開始（t=0），見 script.js -->
  <div
    id="introSequence"
    class="intro-sequence"
    role="presentation"
  >
    <div class="intro-white" aria-hidden="true"></div>
    <button type="button" class="intro-santoo" id="introSantoo" aria-label="播放開場影片並進入網站">
      Santoo
    </button>
    <div class="intro-video-wrap" aria-hidden="true">
      <video
        id="introVideo"
        src="assets/intro.mp4"
        muted
        playsinline
        preload="auto"
      ></video>
    </div>
    <div class="intro-hero8k" aria-hidden="true"></div>
  </div>

  <main class="page page--behind-intro" id="mainPage" aria-hidden="true">
    <section class="hero">
      <div class="structure-container" id="structureContainer"></div>

      <div class="logo" id="logo">
        <span class="logo-full">SANTOO / Structural Studies</span>
        <span class="logo-mark">⌇■</span>
      </div>

      <div class="content" id="systemLabel">
        <h1 id="label1">Santoo Institute</h1>
        <h2 id="label2">for Structural Studies</h2>
        <p id="label3">A framework for observing structural stability across fields.</p>
      </div>
    </section>

    <section class="entry">
      <a href="#">Research</a>
      <a href="#">Works</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
